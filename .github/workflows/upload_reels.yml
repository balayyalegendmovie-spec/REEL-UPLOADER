name: 🎬 Auto Upload Reels

on:
  schedule:
    # Every 2 hours = 12 runs/day = 12 reels/day
    # Each run uploads exactly 1 reel then exits immediately
    # Total runner time per reel: ~3-5 minutes (vs 2+ hours before)
    - cron: '0 0 * * *'    #  0:00 UTC
    - cron: '0 2 * * *'    #  2:00 UTC
    - cron: '0 4 * * *'    #  4:00 UTC
    - cron: '0 6 * * *'    #  6:00 UTC
    - cron: '0 8 * * *'    #  8:00 UTC
    - cron: '0 10 * * *'   # 10:00 UTC
    - cron: '0 12 * * *'   # 12:00 UTC
    - cron: '0 14 * * *'   # 14:00 UTC
    - cron: '0 16 * * *'   # 16:00 UTC
    - cron: '0 18 * * *'   # 18:00 UTC
    - cron: '0 20 * * *'   # 20:00 UTC
    - cron: '0 22 * * *'   # 22:00 UTC
  # Manual trigger button in GitHub Actions UI
  workflow_dispatch:

# Only one upload job runs at a time — no parallel runs
# If a run is still going when next cron fires, next one waits
concurrency:
  group: reel-uploader
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  upload-reels:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # Each run uploads 1 reel → done in ~5 min
                           # 30 min timeout is a generous safety net

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      - name: 🎬 Run Auto Uploader (1 reel per run)
        env:
          IG_USERNAME:      ${{ secrets.IG_USERNAME }}
          IG_PASSWORD:      ${{ secrets.IG_PASSWORD }}
          IG_SESSION:       ${{ secrets.IG_SESSION }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_API_KEY:   ${{ secrets.GDRIVE_API_KEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: 💾 Final progress save
        if: always()
        run: |
          git config user.name "Reel Bot"
          git config user.email "bot@reelbot.com"
          git add movies_log.json progress.json detailed_log.txt .gitignore || true
          git diff --staged --quiet || git commit -m "🤖 Auto: final save"
          git push
